<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070617"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6d5cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6d5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d5cff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="360" fill="url(#orb1)"/>
  <circle cx="160" cy="560" r="320" fill="url(#orb2)"/>

  <!-- Accent tick -->
  <rect x="90" y="232" width="56" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Eyebrow -->
  <text x="90" y="210" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="6"
        fill="#00d4ff" font-weight="600">WEB DEVELOPMENT STUDIO &#183; COLOMBO, SRI LANKA</text>

  <!-- Wordmark -->
  <text x="86" y="330" font-family="Arial, Helvetica, sans-serif" font-size="112"
        fill="#ffffff" font-weight="800" letter-spacing="-2">Lumisk<tspan fill="#6d5cff">&#176;</tspan></text>

  <!-- Headline -->
  <text x="90" y="424" font-family="Arial, Helvetica, sans-serif" font-size="46"
        fill="#ffffff" font-weight="700">Web apps, AI &amp; e-commerce, built end to end.</text>

  <!-- Subline -->
  <text x="90" y="478" font-family="Arial, Helvetica, sans-serif" font-size="28"
        fill="#9c9ab0" font-weight="400">React &#183; FastAPI &#183; Claude AI &#183; Three.js &#183; from LKR 25,000</text>

  <!-- URL pill -->
  <rect x="90" y="528" width="360" height="56" rx="28" fill="none" stroke="#2a2a3a" stroke-width="1.5"/>
  <text x="120" y="564" font-family="Arial, Helvetica, sans-serif" font-size="26"
        fill="#ffffff" font-weight="600">lumisktechnology.com</text>
</svg>
