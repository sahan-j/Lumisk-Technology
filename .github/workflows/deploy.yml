name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Commit dist to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dist/ -f
          git add .cpanel.yml -f
          git commit -m "build: update dist [skip ci]" || echo "No changes"
          git push
